apiVersion: apps/v1
kind: Deployment
metadata:
  name: cancer-mama-api
  labels:
    app: cancer-mama-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cancer-mama-api
  template:
    metadata:
      labels:
        app: cancer-mama-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: tech-challenge-fase2-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MODEL_PATH
              value: /app/resultados/fase2/modelo_serving.joblib
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
